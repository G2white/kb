<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 多智能体监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2em;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95em;
        }

        /* 角色卡片 */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .agent-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .agent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            position: relative;
        }

        .agent-avatar::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            bottom: 2px;
            right: 2px;
            border: 3px solid #1a1a2e;
        }

        .avatar-aoli {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar-aoli::after {
            background: #00d084;
        }

        .avatar-gouzi {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .avatar-gouzi::after {
            background: #666;
        }

        .agent-avatar.active::after {
            background: #00d084;
            animation: pulse 2s infinite;
        }

        .agent-avatar.error::after {
            background: #ff4757;
        }

        .agent-avatar.complete::after {
            background: #3498db;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .agent-info h2 {
            font-size: 1.4em;
            margin-bottom: 5px;
        }

        .agent-role {
            color: #888;
            font-size: 0.9em;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
        }

        .status-indicator.idle { background: #666; }
        .status-indicator.active { background: #00d084; animation: blink 1.5s infinite; }
        .status-indicator.error { background: #ff4757; }
        .status-indicator.complete { background: #3498db; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            font-size: 0.95em;
        }

        .agent-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8em;
            color: #888;
            margin-top: 3px;
        }

        /* 当前任务区域 */
        .section-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 4px solid #667eea;
        }

        .task-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 18px;
            border-left: 4px solid #666;
            transition: all 0.3s;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .task-item.pending { border-left-color: #666; }
        .task-item.in-progress { border-left-color: #00d084; }
        .task-item.completed { border-left-color: #3498db; }
        .task-item.error { border-left-color: #ff4757; }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-title {
            font-weight: 600;
            font-size: 1.05em;
        }

        .task-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .task-badge.pending { background: rgba(102, 102, 102, 0.3); color: #888; }
        .task-badge.in-progress { background: rgba(0, 208, 132, 0.2); color: #00d084; }
        .task-badge.completed { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .task-badge.error { background: rgba(255, 71, 87, 0.2); color: #ff4757; }

        .task-details {
            font-size: 0.9em;
            color: #aaa;
            line-height: 1.6;
        }

        .task-meta {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #888;
        }

        /* 积分排行榜 */
        .score-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .score-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .score-rank {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .score-name {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .score-points {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 0.85em;
            color: #888;
        }

        /* 活动时间线 */
        .timeline-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #667eea, #764ba2);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #667eea;
        }

        .timeline-time {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 5px;
        }

        .timeline-content {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 15px;
            border-radius: 8px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #fff;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 实时连接状态 */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: #888;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .connection-dot.connected {
            background: #00d084;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 1.6em;
            }

            .agents-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OpenClaw 多智能体监控面板</h1>
            <p class="subtitle">家庭 & 公司 双节点协作系统</p>
            <div class="connection-status">
                <span class="connection-dot" id="wsStatus"></span>
                <span id="wsStatusText">连接中...</span>
            </div>
        </header>

        <!-- 角色状态卡片 -->
        <div class="agents-grid">
            <div class="agent-card">
                <div class="agent-header">
                    <div class="agent-avatar avatar-aoli" id="avatar-aoli">
                        🦞
                    </div>
                    <div class="agent-info">
                        <h2>奥利</h2>
                        <p class="agent-role">家里（老二）· 主控</p>
                    </div>
                </div>
                <div class="agent-status">
                    <span class="status-indicator" id="status-aoli"></span>
                    <span class="status-text" id="status-text-aoli">待命中</span>
                </div>
                <div class="agent-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="tasks-aoli">0</div>
                        <div class="stat-label">完成任务</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="score-aoli">0</div>
                        <div class="stat-label">积分</div>
                    </div>
                </div>
            </div>

            <div class="agent-card">
                <div class="agent-header">
                    <div class="agent-avatar avatar-gouzi" id="avatar-gouzi">
                        🐕
                    </div>
                    <div class="agent-info">
                        <h2>狗子</h2>
                        <p class="agent-role">公司（老三）· 执行方</p>
                    </div>
                </div>
                <div class="agent-status">
                    <span class="status-indicator" id="status-gouzi"></span>
                    <span class="status-text" id="status-text-gouzi">待命中</span>
                </div>
                <div class="agent-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="tasks-gouzi">0</div>
                        <div class="stat-label">完成任务</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="score-gouzi">0</div>
                        <div class="stat-label">积分</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 当前任务 -->
        <div class="task-section">
            <h3 class="section-title">📋 当前任务</h3>
            <div class="task-list" id="taskList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无任务</p>
                </div>
            </div>
        </div>

        <!-- 积分排行 -->
        <div class="score-section">
            <h3 class="section-title">🏆 积分排行榜</h3>
            <div class="score-grid" id="scoreGrid">
                <div class="score-card">
                    <div class="score-rank">🥇</div>
                    <div class="score-name">奥利</div>
                    <div class="score-points" id="score-display-aoli">0</div>
                    <div class="score-label">积分</div>
                </div>
                <div class="score-card">
                    <div class="score-rank">🥈</div>
                    <div class="score-name">狗子</div>
                    <div class="score-points" id="score-display-gouzi">0</div>
                    <div class="score-label">积分</div>
                </div>
            </div>
        </div>

        <!-- 活动时间线 -->
        <div class="timeline-section">
            <h3 class="section-title">📊 活动时间线</h3>
            <div class="timeline" id="timeline">
                <div class="timeline-item">
                    <div class="timeline-time" id="lastUpdate">--</div>
                    <div class="timeline-content">系统启动，等待数据更新...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 刷新按钮 -->
    <button class="refresh-btn" id="refreshBtn" title="刷新数据">
        🔄
    </button>

    <script>
        // 状态映射
        const STATUS_MAP = {
            idle: { text: '待命中', color: '#666', avatarClass: '' },
            active: { text: '执行中', color: '#00d084', avatarClass: 'active' },
            error: { text: '异常', color: '#ff4757', avatarClass: 'error' },
            complete: { text: '已完成', color: '#3498db', avatarClass: 'complete' }
        };

        // 数据存储
        let dashboardData = {
            agents: {
                aoli: { status: 'idle', tasks: 0, score: 0 },
                gouzi: { status: 'idle', tasks: 0, score: 0 }
            },
            tasks: [],
            activities: []
        };

        // 更新 Agent 状态显示
        function updateAgentDisplay(agent, data) {
            const statusInfo = STATUS_MAP[data.status] || STATUS_MAP.idle;
            
            document.getElementById(`status-${agent}`).className = `status-indicator ${data.status}`;
            document.getElementById(`status-text-${agent}`).textContent = statusInfo.text;
            document.getElementById(`tasks-${agent}`).textContent = data.tasks;
            document.getElementById(`score-${agent}`).textContent = data.score;
            
            const avatar = document.getElementById(`avatar-${agent}`);
            avatar.className = `agent-avatar avatar-${agent} ${statusInfo.avatarClass}`;
            
            // 更新积分显示
            document.getElementById(`score-display-${agent}`).textContent = data.score;
        }

        // 更新任务列表
        function updateTaskList(tasks) {
            const taskList = document.getElementById('taskList');
            
            if (!tasks || tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无任务</p>
                    </div>
                `;
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.status}">
                    <div class="task-header">
                        <span class="task-title">${task.title}</span>
                        <span class="task-badge ${task.status}">${getTaskStatusText(task.status)}</span>
                    </div>
                    <div class="task-details">${task.description || ''}</div>
                    <div class="task-meta">
                        <span>👤 ${task.assignee || '未分配'}</span>
                        <span>⏱️ ${task.deadline || '无截止时间'}</span>
                    </div>
                </div>
            `).join('');
        }

        function getTaskStatusText(status) {
            const map = {
                pending: '待处理',
                'in-progress': '进行中',
                completed: '已完成',
                error: '异常'
            };
            return map[status] || status;
        }

        // 更新时间线
        function updateTimeline(activities) {
            const timeline = document.getElementById('timeline');
            
            if (!activities || activities.length === 0) {
                return;
            }

            const items = activities.slice(-5).reverse().map(activity => `
                <div class="timeline-item">
                    <div class="timeline-time">${activity.time}</div>
                    <div class="timeline-content">${activity.content}</div>
                </div>
            `).join('');

            timeline.innerHTML = items;
        }

        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            
            try {
                // 从本地存储读取 SCORE.md 数据（模拟）
                // 实际项目中这里应该调用 API 或读取文件
                const savedData = localStorage.getItem('openclaw_dashboard');
                if (savedData) {
                    dashboardData = JSON.parse(savedData);
                }

                // 更新显示
                updateAgentDisplay('aoli', dashboardData.agents.aoli);
                updateAgentDisplay('gouzi', dashboardData.agents.gouzi);
                updateTaskList(dashboardData.tasks);
                updateTimeline(dashboardData.activities);
                updateLastUpdate();

            } catch (error) {
                console.error('刷新失败:', error);
            }

            btn.classList.remove('loading');
        }

        // 保存数据到本地存储
        function saveData() {
            localStorage.setItem('openclaw_dashboard', JSON.stringify(dashboardData));
        }

        // 模拟：添加新任务（测试用）
        function addDemoTask() {
            const newTask = {
                title: '测试任务 - 监控系统集成',
                description: '将监控面板与 OpenClaw 系统对接，实现实时状态同步',
                assignee: '狗子',
                deadline: '2026-03-24',
                status: 'pending'
            };
            dashboardData.tasks.push(newTask);
            dashboardData.activities.push({
                time: new Date().toLocaleString('zh-CN'),
                content: '📝 新任务已添加: ' + newTask.title
            });
            saveData();
            refreshData();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 绑定刷新按钮
            document.getElementById('refreshBtn').addEventListener('click', refreshData);

            // 初始化显示
            refreshData();

            // 每 30 秒自动刷新（模拟实时更新）
            setInterval(refreshData, 30000);

            // WebSocket 连接状态（演示用）
            setTimeout(() => {
                document.getElementById('wsStatus').classList.add('connected');
                document.getElementById('wsStatusText').textContent = '已连接';
            }, 1000);
        });

        // 暴露全局方法供外部调用
        window.dashboardAPI = {
            updateAgent: (agent, data) => {
                dashboardData.agents[agent] = { ...dashboardData.agents[agent], ...data };
                saveData();
                refreshData();
            },
            addTask: (task) => {
                dashboardData.tasks.push(task);
                dashboardData.activities.push({
                    time: new Date().toLocaleString('zh-CN'),
                    content: '📝 新任务: ' + task.title
                });
                saveData();
                refreshData();
            },
            updateTask: (index, data) => {
                if (dashboardData.tasks[index]) {
                    dashboardData.tasks[index] = { ...dashboardData.tasks[index], ...data };
                    saveData();
                    refreshData();
                }
            },
            addActivity: (content) => {
                dashboardData.activities.push({
                    time: new Date().toLocaleString('zh-CN'),
                    content: content
                });
                saveData();
                refreshData();
            },
            setStatus: (agent, status) => {
                dashboardData.agents[agent].status = status;
                saveData();
                refreshData();
            },
            refresh: refreshData
        };

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                refreshData();
            }
        });
    </script>
</body>
</html>
